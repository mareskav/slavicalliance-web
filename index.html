<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slavic Alliance — stránky v přípravě</title>
  <meta name="description" content="Oficiální stránky týmu Slavic Alliance. Stránky jsou v přípravě." />
  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#0f1a38;
      --card:rgba(255,255,255,.06);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.72);
      --border:rgba(255,255,255,.12);
      --shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100svh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      background:
        radial-gradient(900px 600px at 20% 10%, rgba(130,170,255,.18), transparent 60%),
        radial-gradient(800px 700px at 80% 20%, rgba(255,130,180,.12), transparent 55%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding: clamp(18px, 3vw, 28px) 16px;
    }

    .card{
      width:min(860px, 100%);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding: clamp(18px, 3vw, 28px) clamp(14px, 2.2vw, 18px);
      box-shadow:var(--shadow);
      backdrop-filter: blur(8px);
      overflow:hidden;
      text-align:center;
      animation: fadeUp .55s ease-out both;
    }
    @keyframes fadeUp{
      from{ opacity:0; transform: translateY(10px); }
      to{ opacity:1; transform: translateY(0); }
    }

    /* Ořez okrajů okolo loga */
    .logoWrap{
      width: min(520px, 92vw);
      max-height: min(52vh, 420px);
      margin: 0 auto 14px;
      display:grid;
      place-items:center;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,.5));
      overflow:hidden;
      border-radius: 12px;
      transform: translateZ(0);
    }
    .logoWrap svg{
      display:block;
      width: 112%;
      height:auto;
      max-height: min(52vh, 420px);
    }

    /* WOW: pomalé točení + jemný glow */
    .logoWrap .star-spin{
      transform-origin: 50% 50%;
      transform-box: fill-box;
      animation:
        starSpin 9s linear infinite,
        starGlow 2.8s ease-in-out infinite;
      will-change: transform, filter;
    }
    @keyframes starSpin{ from{ transform: rotate(0deg);} to{ transform: rotate(360deg);} }
    @keyframes starGlow{
      0%,100%{ filter: drop-shadow(0 0 0 rgba(255,255,255,0)); }
      50%{ filter: drop-shadow(0 0 10px rgba(255,255,255,.22)); }
    }

    /* Pauza animací v pozadí (šetří CPU) */
    body.paused .star-spin,
    body.paused .beer{
      animation-play-state: paused !important;
    }

    @media (prefers-reduced-motion: reduce){
      .logoWrap .star-spin{ animation: none; }
      .card{ animation: none; }
      .beer{ animation: none; }
    }

    h1{
      margin:0 0 10px;
      font-size: clamp(22px, 3.6vw, 40px);
      letter-spacing: .2px;
    }

    .subtitle{
      margin:0;
      font-size: clamp(15px, 2.3vw, 18px);
      color: var(--muted);
      line-height: 1.6;
    }
    .subtitle-line2{
      display:inline-block;
      margin-top: 4px;
      color: rgba(255,255,255,.90);
    }

    .beer{
      display:inline-block;
      margin-left: 6px;
      animation: beerPop 1.9s ease-in-out infinite;
      transform-origin: 50% 70%;
    }
    @keyframes beerPop{
      0%,100%{ transform: translateY(0) rotate(0deg); }
      50%{ transform: translateY(-2px) rotate(-3deg); }
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      margin-top:14px;
      font-size:14px;
      color: rgba(255,255,255,.78);
    }
    .mini{
      margin-top:14px;
      font-size:13px;
      color: rgba(255,255,255,.55);
    }

    @media (max-width: 480px){
      .logoWrap{
        width: min(420px, 92vw);
        max-height: 36vh;
        margin-bottom: 10px;
      }
      .logoWrap svg{
        width: 118%;
        max-height: 36vh;
      }
      .logoWrap .star-spin{ animation-duration: 11s; }
    }
  </style>
</head>
