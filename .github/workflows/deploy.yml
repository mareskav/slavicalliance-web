name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)
          npx wrangler whoami

      - name: Build site
        run: npm run build:site

      - name: Deploy site to Cloudflare Pages
        working-directory: apps/site
        run: npx wrangler pages deploy out --project-name slavicalliance-site --branch main

      - name: Validate results R2 cache bucket
        working-directory: apps/results
        run: npx wrangler r2 bucket info slavicalliance-results-next-cache

      - name: Patch OpenNext R2 provisioning check
        run: node scripts/patch-opennext-r2-provisioning.mjs

      - name: Build OpenNext results Worker
        working-directory: apps/results
        run: npx opennextjs-cloudflare build

      - name: Deploy results Worker
        working-directory: apps/results
        env:
          OPEN_NEXT_SKIP_R2_BUCKET_PROVISION: "true"
        run: |
          for attempt in 1 2 3; do
            if npx opennextjs-cloudflare deploy --cacheChunkSize 5; then
              exit 0
            fi

            echo "OpenNext deploy attempt $attempt failed"
            sleep $((attempt * 20))
          done

          exit 1
